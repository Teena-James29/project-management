{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="mb-4">Create Project</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ fm.as_p }}

            <button type="submit" class="btn btn-primary">
                Save Project
            </button>

            <a href="/home/" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>

</div>

{% endblock %}
